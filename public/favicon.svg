<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Football pitch background -->
  <rect width="48" height="48" rx="8" fill="#1a8d48"/>
  <!-- Pitch outline -->
  <rect x="6" y="4" width="36" height="40" rx="2" stroke="#fff" stroke-width="1.5" fill="none"/>
  <!-- Center line -->
  <line x1="6" y1="24" x2="42" y2="24" stroke="#fff" stroke-width="1.5"/>
  <!-- Center circle -->
  <circle cx="24" cy="24" r="7" stroke="#fff" stroke-width="1.5" fill="none"/>
  <!-- Center dot -->
  <circle cx="24" cy="24" r="1.5" fill="#fff"/>
  <!-- Top penalty area -->
  <rect x="14" y="4" width="20" height="10" stroke="#fff" stroke-width="1.5" fill="none"/>
  <!-- Bottom penalty area -->
  <rect x="14" y="34" width="20" height="10" stroke="#fff" stroke-width="1.5" fill="none"/>
  <!-- Top goal area -->
  <rect x="18" y="4" width="12" height="5" stroke="#fff" stroke-width="1.5" fill="none"/>
  <!-- Bottom goal area -->
  <rect x="18" y="39" width="12" height="5" stroke="#fff" stroke-width="1.5" fill="none"/>
</svg>
