<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500" fill="none">
  <!-- Pastel mint background -->
  <rect width="500" height="500" rx="80" fill="#E8F5E9"/>

  <!-- Pitch surface (horizontal orientation) -->
  <rect x="40" y="100" width="420" height="300" rx="10" fill="#1a8d48" opacity="0.18"/>

  <!-- Pitch outline -->
  <rect x="40" y="100" width="420" height="300" rx="10" stroke="#1a8d48" stroke-width="6" fill="none" opacity="0.45"/>

  <!-- Center line (vertical) -->
  <line x1="250" y1="100" x2="250" y2="400" stroke="#1a8d48" stroke-width="5" opacity="0.4"/>

  <!-- Center circle -->
  <circle cx="250" cy="250" r="60" stroke="#1a8d48" stroke-width="5" fill="none" opacity="0.4"/>

  <!-- Center dot -->
  <circle cx="250" cy="250" r="6" fill="#1a8d48" opacity="0.4"/>

  <!-- Left penalty area -->
  <rect x="40" y="165" width="90" height="170" rx="4" stroke="#1a8d48" stroke-width="5" fill="none" opacity="0.4"/>

  <!-- Left goal area -->
  <rect x="40" y="200" width="42" height="100" rx="3" stroke="#1a8d48" stroke-width="5" fill="none" opacity="0.4"/>

  <!-- Right penalty area -->
  <rect x="370" y="165" width="90" height="170" rx="4" stroke="#1a8d48" stroke-width="5" fill="none" opacity="0.4"/>

  <!-- Right goal area -->
  <rect x="418" y="200" width="42" height="100" rx="3" stroke="#1a8d48" stroke-width="5" fill="none" opacity="0.4"/>

  <!-- LEFT WING: Ligue 1 — red circle, "L1" -->
  <circle cx="128" cy="185" r="34" fill="#DA291C"/>
  <circle cx="128" cy="185" r="34" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.25"/>
  <text x="128" y="193" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="20" fill="#ffffff">L1</text>

  <!-- LEFT CENTER: Europa League — orange circle, "UEL" -->
  <circle cx="175" cy="315" r="34" fill="#F68E1E"/>
  <circle cx="175" cy="315" r="34" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.25"/>
  <text x="175" y="323" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="16" fill="#ffffff">UEL</text>

  <!-- CENTER MIDFIELD: Champions League — navy circle, "UCL" (larger) -->
  <circle cx="250" cy="250" r="46" fill="#071D49"/>
  <circle cx="250" cy="250" r="46" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.3"/>
  <text x="250" y="259" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="20" fill="#ffffff">UCL</text>

  <!-- RIGHT CENTER: Conference League — green circle, "UECL" -->
  <circle cx="325" cy="315" r="34" fill="#09A14A"/>
  <circle cx="325" cy="315" r="34" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.25"/>
  <text x="325" y="323" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="13" fill="#ffffff">UECL</text>

  <!-- RIGHT WING: Premier League — purple circle, "PL" -->
  <circle cx="372" cy="185" r="34" fill="#3D195B"/>
  <circle cx="372" cy="185" r="34" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.25"/>
  <text x="372" y="193" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="20" fill="#ffffff">PL</text>
</svg>
